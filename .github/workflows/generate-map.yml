name: Generate Dolphin Map

on:
  push:
    branches: [main]
    paths:
      - config/GL5E4F/symbols.txt

permissions:
  contents: write

jobs:
  generate-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GL5E4F.map
        run: python3 tools/symbols_to_map.py

      - name: Commit updated map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/GL5E4F/GL5E4F.map
          if git diff --staged --quiet; then
            echo "No changes to map file."
          else
            git commit -m "chore: regenerate GL5E4F.map from symbols.txt"
            git push
          fi
