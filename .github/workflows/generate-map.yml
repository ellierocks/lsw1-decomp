name: Build Dolphin symbol map

on:
  push:
    branches: [main]
    paths:
      - config/GL5E4F/symbols.txt
      - tools/symbols_to_map.py
      - .github/workflows/generate-map.yml
  pull_request:
    paths:
      - config/GL5E4F/symbols.txt
      - tools/symbols_to_map.py
      - .github/workflows/generate-map.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Dolphin map
        run: |
          mkdir -p artifacts
          python3 tools/symbols_to_map.py --all --output artifacts/GL5E4F.map

      - name: Upload Dolphin map
        uses: actions/upload-artifact@v4
        with:
          name: GL5E4F-dolphin-map
          path: artifacts/GL5E4F.map
          if-no-files-found: error
          retention-days: 90
